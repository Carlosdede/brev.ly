services:
  postgres:
    image: postgres:16-alpine
    container_name: brevly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: brevly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker -d brevly"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: brevly-migrations
    environment:
      DATABASE_URL: postgresql://docker:docker@postgres:5432/brevly
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run db

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: brevly-api
    restart: unless-stopped
    environment:
      PORT: 3333
      DATABASE_URL: postgresql://docker:docker@postgres:5432/brevly
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_ACCESS_KEY_ID: ${CLOUDFLARE_ACCESS_KEY_ID}
      CLOUDFLARE_SECRET_ACCESS_KEY: ${CLOUDFLARE_SECRET_ACCESS_KEY}
      CLOUDFLARE_BUCKET: ${CLOUDFLARE_BUCKET}
      CLOUDFLARE_PUBLIC_URL: ${CLOUDFLARE_PUBLIC_URL}
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  web:
    build:
      context: ./Web
      dockerfile: Dockerfile
    container_name: brevly-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data: