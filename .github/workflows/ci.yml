name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  server:
    name: Server CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build

      - name: Build server Docker image
        run: docker build -t brevly-server .

  web:
    name: Web CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Build web Docker image
        run: docker build -t brevly-web .